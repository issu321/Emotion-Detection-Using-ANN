{% extends "base.html" %}

{% block title %}Login - Emotion-Detection-Using-ANN{% endblock %}

{% block extra_styles %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        position: relative;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        background: var(--glass);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 1.5rem;
        padding: 3rem;
        position: relative;
        overflow: hidden;
        animation: cardFloat 0.8s ease;
        z-index: 1;
    }

    @keyframes cardFloat {
        from { opacity: 0; transform: translateY(40px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        animation: gradientShift 3s ease infinite;
        background-size: 200% 200%;
    }

    .auth-card::after {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 1.5rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: -1;
        filter: blur(20px);
    }

    .auth-card:hover::after {
        opacity: 0.3;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .auth-header .logo-icon {
        width: 80px;
        height: 80px;
        border-radius: 1.5rem;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2rem;
        color: white;
        animation: iconPulse 3s ease infinite;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }

    @keyframes iconPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4); }
        50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(236, 72, 153, 0.5); }
    }

    .auth-header h2 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--gray);
        font-size: 0.875rem;
    }

    .auth-form .form-group {
        margin-bottom: 1.5rem;
        position: relative;
    }

    .input-wrapper {
        position: relative;
    }

    .input-wrapper i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gray);
        transition: all 0.3s ease;
    }

    .input-wrapper .form-input:focus + i {
        color: var(--primary);
    }

    .input-wrapper .form-input {
        padding-left: 3rem;
    }

    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid var(--glass-border);
    }

    .auth-footer p {
        color: var(--gray);
        font-size: 0.875rem;
    }

    .auth-footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .auth-footer a:hover {
        text-decoration: underline;
        color: var(--secondary);
    }

    .btn-full {
        width: 100%;
        justify-content: center;
    }

    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--gray);
        font-size: 0.875rem;
    }

    .remember-me input {
        accent-color: var(--primary);
    }

    .forgot-link {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .forgot-link:hover {
        color: var(--secondary);
    }

    .social-login {
        margin-top: 1.5rem;
    }

    .social-login p {
        text-align: center;
        color: var(--gray);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        position: relative;
    }

    .social-login p::before,
    .social-login p::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 30%;
        height: 1px;
        background: var(--glass-border);
    }

    .social-login p::before { left: 0; }
    .social-login p::after { right: 0; }

    .social-buttons {
        display: flex;
        gap: 1rem;
    }

    .social-btn {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--glass-border);
        border-radius: 0.75rem;
        background: var(--glass);
        color: var(--light);
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .social-btn:hover {
        border-color: var(--primary);
        background: rgba(99, 102, 241, 0.1);
        transform: translateY(-2px);
    }

    .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none !important;
        overflow: hidden;
        z-index: 0;
    }

    .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.2;
        animation: shapeFloat 10s ease-in-out infinite;
    }

    .shape-1 {
        width: 300px;
        height: 300px;
        background: var(--primary);
        top: -100px;
        left: -100px;
    }

    .shape-2 {
        width: 250px;
        height: 250px;
        background: var(--secondary);
        bottom: -50px;
        right: -50px;
        animation-delay: 3s;
    }

    @keyframes shapeFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(30px, -30px) scale(1.1); }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">
                <i class="fas fa-wave-square"></i>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to access your emotion dashboard</p>
        </div>

        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="remember-forgot">
                <label class="remember-me">
                    <input type="checkbox" checked>
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-glow btn-shine particle-btn">
                <i class="fas fa-sign-in-alt"></i>
                Sign In
            </button>
        </form>

        <div class="social-login">
            <p>Or continue with</p>
            <div class="social-buttons">
                <button class="social-btn" onclick="showToast('GitHub login coming soon!', 'info')">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
                <button class="social-btn" onclick="showToast('Google login coming soon!', 'info')">
                    <i class="fab fa-google"></i>
                    Google
                </button>
            </div>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
